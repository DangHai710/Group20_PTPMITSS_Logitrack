# File: application.properties
# Spring Boot Configuration for LogiTrack B2B (PostgreSQL Database)

server.port=8080

# 1. Database Connection Configuration
# Change 'localhost:5432/logitrack' to your PostgreSQL server and database
# Make sure the 'logitrack' database exists in your PostgreSQL instance before starting the app!
spring.datasource.url=jdbc:postgresql://localhost:5432/logitrack
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. JPA & Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# ddl-auto=none since we are manually controlling creation with schema.sql
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 3. Initialization Scripts Configuration (Spring Boot 3.x standard)
# This will execute schema.sql and data.sql on startup
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# 4. JSON Serialization Configurations
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=GMT+7

# 5. Logging Configuration
logging.level.org.springframework.web=INFO
logging.level.com.logitrack=DEBUG
logging.level.org.hibernate.SQL=DEBUG
